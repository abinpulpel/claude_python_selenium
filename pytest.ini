[pytest]
pythonpath = src
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    smoke: quick smoke-suite scenarios
    regression: full regression scenarios
addopts =
    -v
    --strict-markers
    --html=reports/report.html
    --self-contained-html
    --reruns 1
    --reruns-delay 2
log_cli = true
log_cli_level = INFO
